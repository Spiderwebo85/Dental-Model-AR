<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene xr-mode-ui="XRMode: xr;" webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor">
        <a-assets timeout="30000">
            <a-asset-item id="DentalmodelAR" src="prothesis_single_denture_try-_in_scan.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0"></a-camera>

        <a-entity
            gltf-model="#DentalmodelAR"
            position="0 -1 -1"
            rotation="0 0 0"
            scale="1 1 1"
        ></a-entity>

    </a-scene>
</body>
</html>
